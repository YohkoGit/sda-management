# Capture Plan — Epic 8: Department Management
# Used ONLY during screenshot capture sessions (not loaded during dev-story)

epic: 8
name: "Department Management"

prerequisites:
  app_running: true
  base_url: "http://localhost:5173"
  auth_roles_needed: [viewer, admin]
  seed_data: "N/A — all API responses mocked via Playwright route interception"
  note: "Backend running but route interception used for consistent screenshots"

ux_spec_sections:
  - "§6 Visual Design Foundation — Department Color Palette, Status Indicators"
  - "§7 Typography System — Micro-labels, Operational Register"
  - "§8 User Journey Flows — Journey 3: Department Director Monitoring, Journey 4: Pastor Cross-Department"
  - "§9 Component Strategy — StaffingIndicator, DepartmentBadge, ActivityCard"
  - "§10 UX Consistency Patterns — Vocabulary Register (Unités Ministérielles)"
  - "§11 Responsive Design — Breakpoint Behavior Per View (Department View)"
  - "§12 Empty States — Encouraging tone, not clinical"

