stories:
  # Stories 9-1 and 9-2: No frontend screens (backend/infrastructure)
  # 9-1-signalr-hub-and-connection-lifecycle: no UI
  # 9-2-real-time-activity-update-broadcasting: no UI (hooks only)

  9-3-modifie-badge-for-recent-changes:
    description: "Amber-500 'Modifié' badge on recently updated activities across 6 views"
    role: anonymous+viewer+admin
    note: "Badge state injected via localStorage (sdac-modified-badges). Route interception for API mocks. Activity IDs 101 and 301 marked as modified."
    screens:
      # --- PUBLIC DASHBOARD: Mobile — ActivityCard with badge ---
      - id: 01-public-upcoming-badge-mobile
        url: /
        viewport: [375, 812]
        desc: "Public homepage upcoming activities — ActivityCard showing amber 'Modifié' badge on activities 101 and 301"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config/public": "publicChurchInfo"
              "/api/config": "publicConfig"
              "/api/public/live-status": "liveStatus"
              "/api/public/next-activity": "nextActivity"
              "/api/public/upcoming-activities": "upcomingActivities"
              "/api/public/program-schedules": "programSchedules"
              "/api/public/departments": "publicDepartments"
              "/api/auth/me": 401
          - scroll_to: "upcoming-activities section"
        ux_checks:
          - "Amber-500 pill badge showing 'Modifié' text on activity 101 (Culte du Sabbat)"
          - "Amber-500 pill badge showing 'Modifié' text on activity 301 (Programme JA)"
          - "Activity 102 (École du Sabbat) has NO badge — not marked as modified"
          - "Badge uses text-xs (12px) font-medium — caption typography per UX spec"
          - "Badge appears in flex-wrap row alongside department abbreviation badge"
          - "Badge has white text on amber-500 background"
          - "Badge shape is pill (rounded-full from Badge component)"
          - "Badge does not break card layout — wraps naturally with gap-2"

      # --- PUBLIC DASHBOARD: Desktop — ActivityCard with badge ---
      - id: 02-public-upcoming-badge-desktop
        url: /
        viewport: [1280, 800]
        desc: "Public homepage desktop — ActivityCards in grid with 'Modifié' badges visible alongside department badges"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config/public": "publicChurchInfo"
              "/api/config": "publicConfig"
              "/api/public/live-status": "liveStatus"
              "/api/public/next-activity": "nextActivity"
              "/api/public/upcoming-activities": "upcomingActivities"
              "/api/public/program-schedules": "programSchedules"
              "/api/public/departments": "publicDepartments"
              "/api/auth/me": 401
          - scroll_to: "upcoming-activities section"
        ux_checks:
          - "'Modifié' badge on activity 101 and 301"
          - "No badge on activity 102 (not modified)"
          - "Badge coexists with department abbreviation badge in flex-wrap row"
          - "Cards in responsive grid layout"
          - "Badge color amber-500 distinct from department colors (rose/teal)"

      # --- AUTH DASHBOARD: Desktop — DashboardActivityCard with badge ---
      - id: 03-auth-dashboard-badge-desktop
        url: /dashboard
        viewport: [1280, 800]
        desc: "Authenticated dashboard — DashboardActivityCard showing 'Modifié' badge in title row (Row 2) between title and specialType"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config": "publicConfig"
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/dashboard": "dashboardActivities"
        ux_checks:
          - "'Modifié' badge on activity 101 (Culte du Sabbat) in title row"
          - "'Modifié' badge on activity 301 (Programme JA) in title row"
          - "No badge on activity 102 (École du Sabbat)"
          - "Badge right-aligned in flex row with shrink-0"
          - "Badge does not push title off-screen — title truncates if needed"
          - "Department color left-border accent (4px) visible on each card"
          - "Sidebar visible (authenticated desktop layout)"

      # --- AUTH DASHBOARD: Mobile — DashboardActivityCard with badge ---
      - id: 04-auth-dashboard-badge-mobile
        url: /dashboard
        viewport: [375, 812]
        desc: "Authenticated dashboard mobile — DashboardActivityCard with 'Modifié' badge in compact layout"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config": "publicConfig"
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/dashboard": "dashboardActivities"
        ux_checks:
          - "'Modifié' badge visible on mobile card layout"
          - "Badge does not cause horizontal overflow"
          - "Bottom nav visible"
          - "Cards stack vertically"

      # --- CALENDAR DAY DETAIL: Desktop — Badge next to title ---
      - id: 05-calendar-day-detail-badge-desktop
        url: /my-calendar
        viewport: [1280, 800]
        desc: "Auth calendar — click on March 28 to open day detail dialog/sheet showing 'Modifié' badge next to activity title"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config": "publicConfig"
              "/api/auth/me": "auth_me_viewer"
              "/api/calendar*": "calendarActivities"
              "/api/departments/with-staffing": "departmentsWithStaffing"
          - click: "March 28 day cell in calendar"
        ux_checks:
          - "Day detail dialog/sheet open for March 28"
          - "'Modifié' badge inline with 'Culte du Sabbat' title (gap-1.5)"
          - "'Modifié' badge inline with 'Programme JA' title"
          - "Badge uses text-xs — appropriate for compact list items"
          - "Badge does not break truncation of long titles"
          - "Time range visible below title"

      # --- ADMIN ACTIVITIES TABLE: Desktop — Badge in title cell ---
      - id: 06-admin-activities-badge-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Admin activities table — 'Modifié' badge inline with title text in table cell, between title and specialType badge"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config": "publicConfig"
              "/api/auth/me": "auth_me_admin"
              "/api/activities": "allActivities"
              "/api/departments/with-staffing": "departmentsWithStaffing"
        ux_checks:
          - "'Modifié' badge inline after 'Culte du Sabbat' title in table cell"
          - "'Modifié' badge inline after 'Programme JA' title in table cell"
          - "No badge on 'École du Sabbat' and 'Réunion de prière' rows"
          - "Badge inline-flex keeps alignment with text baseline"
          - "Badge amber-500 color distinct from table row hover"
          - "Admin sidebar visible"

      # --- DEPARTMENT DETAIL: Desktop — Badge in activity list ---
      - id: 07-department-detail-badge-desktop
        url: /my-departments/1
        viewport: [1280, 800]
        desc: "Department detail (Culte) — activity list item with 'Modifié' badge between title and staffing indicator"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config": "publicConfig"
              "/api/auth/me": "auth_me_viewer"
              "/api/departments/with-staffing": "departmentsWithStaffing"
              "/api/departments/1": "departmentDetail_CU"
              "/api/activities?departmentId=1": "activitiesByDept_CU"
        ux_checks:
          - "'Modifié' badge on 'Culte du Sabbat' activity row"
          - "No badge on 'École du Sabbat' row"
          - "Badge positioned in flex row between title (flex-1 truncate) and staffing indicator"
          - "Badge does not overlap or push staffing indicator off-screen"
          - "Rose left-border accent for Culte department"
          - "2-column layout: pipeline left, sidebar right"

      # --- ACTIVITY DETAIL: Desktop — Badge in header (dismiss on view) ---
      - id: 08-activity-detail-badge-desktop
        url: /activities/101
        viewport: [1280, 800]
        desc: "Activity detail page — 'Modifié' badge in header (will auto-dismiss via useEffect, capture immediately)"
        actions:
          - localStorage_set:
              key: "sdac-modified-badges"
              value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z"}},"version":0}'
          - route_mock:
              "/api/config": "publicConfig"
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/101": "activityDetail_101"
        note: "Badge auto-dismisses via useEffect after first render. The badge should flash briefly then disappear. Playwright screenshot captures the DOM state — badge may or may not be visible depending on timing. This is an edge case screen."
        ux_checks:
          - "Activity detail header with title 'Culte du Sabbat'"
          - "'Modifié' badge may be visible briefly in header (auto-dismiss on view — AC 2)"
          - "Full roster visible with role assignments"
          - "Activity metadata (date, time, department) visible"
