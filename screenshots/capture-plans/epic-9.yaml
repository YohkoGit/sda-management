# Capture Plan — Epic 9: Real-Time Updates & Live Experience
# Stories 9-1 and 9-2 are backend/infrastructure — no visual screens
# Story 9-3 adds "Modifié" badge across 6 frontend views

epic: 9
name: "Real-Time Updates & Live Experience"

prerequisites:
  app_running: true
  base_url: "http://localhost:5173"
  auth_roles_needed: [anonymous, viewer, admin]
  seed_data: "N/A — all API responses mocked via Playwright route interception"
  note: "Backend not required. Route interception for API mocks. localStorage injection for badge state."

ux_spec_sections:
  - "§6 Visual Design Foundation — Semantic Status Colors (Modified: amber-500 badge)"
  - "§7 Typography System — Caption: text-xs (12px) font-medium (500) for badge content"
  - "§9 Component Strategy — ModifiedBadge (amber-500 pill, aria-live=polite)"
  - "§12 Accessibility — aria-live=polite for dynamic change announcements"
  - "§11 Responsive Design — Breakpoint Behavior (sm: 640px, lg: 1024px)"

# localStorage injection — set BEFORE each navigation
localStorage_injection:
  sdac-modified-badges:
    key: "sdac-modified-badges"
    value: '{"state":{"modifiedActivities":{"101":"2026-03-22T10:00:00.000Z","301":"2026-03-22T10:00:00.000Z"}},"version":0}'
    note: "Simulates two activities (ID 101, 301) having received ActivityUpdated SignalR events. Timestamp is recent (within 24h). Inject BEFORE navigation so badge store hydrates from localStorage on app mount."

