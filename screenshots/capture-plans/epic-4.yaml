# Capture Plan — Epic 4: Activity Scheduling & Role Assignment
# Used ONLY during screenshot capture sessions (not loaded during dev-story)

epic: 4
name: "Activity Scheduling & Role Assignment"

prerequisites:
  app_running: true
  base_url: "http://localhost:5173"
  auth_roles_needed: [admin, owner]
  seed_data: "Owner seeded, multiple users, departments created, activity templates created, activities with various staffing levels, guest speakers created"

ux_spec_sections:
  - "§6 Visual Design Foundation — Color System, Typography System, Spacing & Layout"
  - "§7 Design Direction — Mock Faithful Command (A+D Hybrid)"
  - "§9 Component Strategy — ActivityCard, StaffingIndicator, RoleSlot, ContactPicker, DepartmentBadge"
  - "§10 UX Consistency Patterns — Button Hierarchy, Form Patterns, Feedback Patterns, Modal & Overlay, Loading & Skeleton"
  - "§11 Responsive Design & Accessibility — Touch Targets, Focus Management"

stories:
  4-1-activity-data-model-and-basic-crud:
    description: "Activity list table and create/edit form"
    role: admin
    screens:
      # --- Mobile (375px) ---
      - id: 01-activity-list-empty-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Empty state when no activities exist"
        actions:
          - login: "as admin user"
          - mock_override: "activitiesEmpty"
        ux_checks:
          - "Empty state guidance text in French"
          - "'Aucune activité' message"
          - "Create button visible"
          - "Single-column layout"

      - id: 02-activity-list-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Activity list/table on mobile"
        actions:
          - login: "as admin user"
        ux_checks:
          - "Activity rows with title, date"
          - "Department badge with color"
          - "Edit/Delete action buttons per row"
          - "44px touch targets"
          - "Rows are clickable (opens roster panel)"

      - id: 03-activity-create-form-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Create activity form (Sheet on mobile)"
        actions:
          - login: "as admin user"
          - click: "create activity button"
          - note: "After template selection (Story 4.2)"
        ux_checks:
          - "Sheet slides up from bottom"
          - "Title, Description, Date, Start/End Time, Department, Visibility fields"
          - "Labels above fields"
          - "Date input type='date'"
          - "Time inputs type='time'"
          - "Department select filtered by user's departments"
          - "Visibility radio: 'Publique' / 'Authentifié seulement'"
          - "Full-width inputs and buttons"
          - "44px minimum touch targets"

      # --- Desktop (1280px) ---
      - id: 04-activity-list-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Activity table on desktop"
        actions:
          - login: "as admin user"
        ux_checks:
          - "Table with columns: Title, Date, Time, Department, Visibility, Actions"
          - "Department badges with colors"
          - "Sidebar with active nav item"
          - "Create button top-right"
          - "Rows clickable for detail"

      - id: 05-activity-create-dialog-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Create activity dialog on desktop"
        actions:
          - login: "as admin user"
          - click: "create activity button"
          - note: "After template selection"
        ux_checks:
          - "Dialog with form fields"
          - "Max-width constraint"
          - "Labels above fields"
          - "Submit button right-aligned"
          - "rounded-2xl dialog"

      - id: 06-activity-edit-dialog-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Edit activity dialog pre-populated"
        actions:
          - login: "as admin user"
          - click: "edit button on an activity row"
        ux_checks:
          - "Dialog with pre-populated form"
          - "All fields editable"
          - "'Modifier' primary button"
          - "Cancel button"

  4-2-activity-creation-from-templates:
    description: "Two-step create flow: template selection then form"
    role: admin
    screens:
      # --- Mobile (375px) ---
      - id: 01-template-selector-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Template selection step on mobile"
        actions:
          - login: "as admin user"
          - click: "create activity button"
        ux_checks:
          - "Title: 'Choisir un modèle'"
          - "Subtitle about pre-filling roles"
          - "Template cards in single-column grid"
          - "Each card: name, description (line-clamp-2), role summary"
          - "Custom card with dashed border: 'Activité sans modèle'"
          - "Plus icon on custom card"
          - "Selected state: border-primary ring-2"
          - "Cards are role='radiogroup' with role='radio'"

      - id: 02-template-selected-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Template selected — shows form with role summary"
        actions:
          - login: "as admin user"
          - click: "create activity button"
          - click: "select a template card"
        ux_checks:
          - "Back button: 'Retour aux modèles' with ChevronLeft"
          - "Role summary badges (secondary variant)"
          - "Badge format: '{roleName} x{headcount}'"
          - "Caption: 'Ces rôles seront créés automatiquement'"
          - "Form fields below role summary"

      - id: 03-template-empty-state-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Template selector with no templates available"
        actions:
          - login: "as admin user"
          - click: "create activity button"
          - mock_override: "templatesEmpty"
        ux_checks:
          - "Empty message for ADMIN: 'Contactez l'administrateur...'"
          - "Custom 'sans modèle' card still available"

      # --- Desktop (1280px) ---
      - id: 04-template-selector-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Template selector in 3-column grid on desktop"
        actions:
          - login: "as admin user"
          - click: "create activity button"
        ux_checks:
          - "3-column grid (lg:grid-cols-3)"
          - "Template cards with hover effect (shadow-md, -translate-y-0.5)"
          - "Custom dashed card alongside templates"
          - "Keyboard accessible (Enter/Space to select)"

      - id: 05-template-loading-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Template selector loading state"
        actions:
          - login: "as admin user"
          - click: "create activity button"
          - mock_override: "templatesDelayed"
        ux_checks:
          - "3 skeleton cards"
          - "Skeleton pulse animation"

