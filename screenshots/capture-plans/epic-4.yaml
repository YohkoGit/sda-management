  4-8-concurrent-edit-detection:
    description: "Conflict alert dialog when 409 received during activity edit"
    role: admin
    screens:
      # --- Mobile (375px) ---
      - id: 01-conflict-dialog-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "Conflict alert dialog on mobile"
        actions:
          - login: "as admin user"
          - click: "edit activity"
          - mock_override: "concurrencyConflict409"
          - click: "submit edit"
        ux_checks:
          - "AlertDialog visible"
          - "Title: 'Conflit de modification'"
          - "Description explaining concurrent edit"
          - "'Recharger les données' primary button (safe default)"
          - "'Écraser avec mes modifications' destructive button (red)"
          - "French text throughout"
          - "Edit form visible behind dialog"

      - id: 02-conflict-reload-success-mobile
        url: /admin/activities
        viewport: [375, 812]
        desc: "After clicking 'Recharger les données'"
        actions:
          - login: "as admin user"
          - note: "After conflict dialog → reload"
        ux_checks:
          - "Form fields reset with server's current values"
          - "Success toast: 'Données rechargées'"
          - "Edit form stays open"
          - "AlertDialog dismissed"

      # --- Desktop (1280px) ---
      - id: 03-conflict-dialog-desktop
        url: /admin/activities
        viewport: [1280, 800]
        desc: "Conflict alert dialog on desktop"
        actions:
          - login: "as admin user"
          - click: "edit activity"
          - mock_override: "concurrencyConflict409"
          - click: "submit edit"
        ux_checks:
          - "AlertDialog centered on desktop"
          - "Title: 'Conflit de modification'"
          - "Two action buttons clearly styled"
          - "Reload as primary/safe option"
          - "Overwrite as destructive"
          - "Edit dialog visible behind"
          - "Backdrop semi-transparent"
