stories:
  6-1-personal-assignments-view-my-assignments:
    description: "Personal assignments view on authenticated dashboard — My Assignments section"
    role: viewer
    note: "Backend down — all API responses mocked via Playwright route interception"
    screens:
      # --- Mobile (375px) — Data State ---
      - id: 01-assignments-data-mobile
        url: /dashboard
        viewport: [375, 812]
        desc: "My Assignments section on mobile — 3 assignment cards stacked"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_data"
        ux_checks:
          - "Section heading 'Mes Affectations' in text-xl font-bold text-foreground"
          - "H2 heading level (proper hierarchy under dashboard h1)"
          - "Welcome message 'Bienvenue, Marie' visible above section"
          - "Assignment cards stacked vertically (single column)"
          - "Each card has rounded-2xl border with 4px left border in department color"
          - "First card has bg-primary/5 emphasis (indigo-50 tint)"
          - "Department badge: colored chip with abbreviation text (MIFEM, JA)"
          - "Date line: formatted date (Samedi 21 mars) + relative distance (dans X jours)"
          - "Activity title in text-base font-bold text-foreground"
          - "Role name in text-sm font-semibold text-primary (indigo-600)"
          - "Time range in text-xs text-muted-foreground (10h00–12h00)"
          - "Co-assignee avatars: 28px InitialsAvatar circles"
          - "Co-assignee names listed next to avatars"
          - "Guest co-assignee shows '(Invité)' label"
          - "Special type badge on Programme JA and Sainte-Cène"
          - "Cards use semantic tokens (bg-background, text-foreground, border-border)"
          - "space-y-3 gap between cards"
          - "Minimum 11px text allowed (authenticated register)"
          - "Cards are focusable (tabIndex=0)"

      # --- Desktop (1280px) — Data State ---
      - id: 02-assignments-data-desktop
        url: /dashboard
        viewport: [1280, 800]
        desc: "My Assignments section on desktop with sidebar layout"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_data"
        ux_checks:
          - "Dashboard layout with authenticated sidebar visible"
          - "Welcome message + section heading visible"
          - "Assignment cards with sm:p-5 padding"
          - "Department badges with colored backgrounds"
          - "First card emphasis (bg-primary/5)"
          - "Co-assignee avatar row with -space-x-1 overlap"
          - "Cards constrained within content area (not full bleed)"
          - "Proper spacing between section title and cards (mt-4)"

      # --- Mobile (375px) — Empty State ---
      - id: 03-assignments-empty-mobile
        url: /dashboard
        viewport: [375, 812]
        desc: "My Assignments empty state — no upcoming assignments"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_empty"
        ux_checks:
          - "Section heading 'Mes Affectations' still visible"
          - "Empty message: 'Aucune affectation à venir'"
          - "Hint text below: 'Les affectations apparaissent ici...'"
          - "Empty container with rounded-2xl border border-border bg-background"
          - "Text centered, text-sm font-medium text-muted-foreground"
          - "role=status on empty container for screen readers"
          - "No broken layout or missing sections"

      # --- Desktop (1280px) — Empty State ---
      - id: 04-assignments-empty-desktop
        url: /dashboard
        viewport: [1280, 800]
        desc: "My Assignments empty state on desktop"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_empty"
        ux_checks:
          - "Empty state centered in content area"
          - "Sidebar visible alongside empty dashboard"
          - "p-8 padding on empty container"
          - "Hint text visible below main message"

      # --- Mobile (375px) — Error State ---
      - id: 05-assignments-error-mobile
        url: /dashboard
        viewport: [375, 812]
        desc: "My Assignments error state with retry button"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_error"
        ux_checks:
          - "Section heading 'Mes Affectations' still visible"
          - "Error message: 'Impossible de charger vos affectations'"
          - "Retry button: 'Réessayer' in text-sm font-medium text-primary"
          - "Error container with border-destructive/20 bg-destructive/10"
          - "role=alert on error container for screen reader announcement"
          - "rounded-2xl border on error container"

      # --- Desktop (1280px) — Error State ---
      - id: 06-assignments-error-desktop
        url: /dashboard
        viewport: [1280, 800]
        desc: "My Assignments error state on desktop"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_error"
        ux_checks:
          - "Error container centered in content area"
          - "Retry button visible and clickable"
          - "Sidebar visible alongside error state"
          - "Error text in text-sm text-destructive"

  6-2-full-activity-roster-view:
    description: "Full activity detail page with roster — accessible at /activities/:id for VIEWER+"
    role: viewer
    note: "Backend down — all API responses mocked via Playwright route interception"
    screens:
      # --- Mobile (375px) — Data State (VIEWER) ---
      - id: 01-detail-data-mobile
        url: /activities/1
        viewport: [375, 812]
        desc: "Activity detail page with full roster on mobile — VIEWER role, no edit button"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/1": "activity_detail_data"
        ux_checks:
          - "Back button '← Retour' links to /dashboard"
          - "Department badge: colored chip with 'JA' abbreviation (teal-ish #14B8A6 background)"
          - "Formatted date (Samedi 21 mars 2026) + relative distance"
          - "Activity title 'Culte Divin' as h1, text-2xl font-black"
          - "Time range displayed (10h00 – 12h00)"
          - "Special type badge 'Journée de la Femme' visible"
          - "StaffingIndicator: shape-based icon + fraction (5/7) with partial status color"
          - "Description text 'Service principal du samedi matin' visible"
          - "Department color left-border accent (4px) on header card"
          - "Section heading h2 'Composition de l'activité'"
          - "PRÉDICATEUR role: uppercase micro-label text-[11px] font-black tracking-wider"
          - "Headcount fraction '1/1' in emerald-600 (complete)"
          - "48px avatar (InitialsAvatar size=lg) for Mario Vicuna"
          - "ANCIEN DE SERVICE role: '1/1' in emerald-600"
          - "DIACRES role: '2/3' in amber-600 (partial)"
          - "Two assigned avatars + one dashed-border empty slot 'Non assigné'"
          - "DIACONESSES role: '1/2' in amber-600 (partial)"
          - "Guest assignee shows '(Invité)' micro-label in muted text"
          - "Dashed-border 48px circle placeholder for unfilled slot"
          - "NO 'Modifier' edit button visible (VIEWER role)"
          - "Role slots stacked in single column (mobile)"
          - "Semantic tokens throughout (bg-background, text-foreground, border-border)"
          - "Minimum 11px text (authenticated register)"

      # --- Desktop (1280px) — Data State (VIEWER) ---
      - id: 02-detail-data-desktop
        url: /activities/1
        viewport: [1280, 800]
        desc: "Activity detail page with full roster on desktop — VIEWER role, sidebar visible"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/1": "activity_detail_data"
        ux_checks:
          - "Authenticated sidebar visible on left"
          - "Content area constrained (max-w-3xl mx-auto or similar)"
          - "Back button and header visible"
          - "Department badge + date + title + time + special type + staffing indicator"
          - "Description text visible"
          - "Role slots in grid layout (lg:grid-cols-2 per UX spec)"
          - "48px avatars with full names below"
          - "Empty slots with dashed borders + 'Non assigné'"
          - "Guest label '(Invité)' visible"
          - "No edit button (VIEWER)"
          - "Proper spacing between header and roster sections"

      # --- Desktop (1280px) — ADMIN with Edit Button ---
      - id: 03-detail-admin-desktop
        url: /activities/1
        viewport: [1280, 800]
        desc: "Activity detail page as ADMIN — Edit button visible (matching department)"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_admin"
              "/api/activities/1": "activity_detail_data"
        ux_checks:
          - "'Modifier' edit button/link visible in header area"
          - "Edit link navigates to /admin/activities"
          - "Same roster display as VIEWER (read-only view with edit access)"
          - "Sidebar shows admin navigation context"

      # --- Mobile (375px) — Skeleton Loading ---
      - id: 04-detail-skeleton-mobile
        url: /activities/1
        viewport: [375, 812]
        desc: "Activity detail loading state with skeleton placeholders"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
          - route_mock_delay:
              "/api/activities/1": 30000
        ux_checks:
          - "Skeleton placeholders matching final layout structure"
          - "Header skeleton (title, date, badge areas)"
          - "3-4 role slot skeletons below header"
          - "Back button still visible during loading"
          - "No broken layout or flash of error state"

      # --- Mobile (375px) — 404 Not Found ---
      - id: 05-detail-404-mobile
        url: /activities/999
        viewport: [375, 812]
        desc: "Activity not found state with link back to dashboard"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/999": "activity_detail_404"
        ux_checks:
          - "'Activité non trouvée' message displayed"
          - "Hint text: 'Cette activité n'existe pas ou a été supprimée'"
          - "Link 'Retour au tableau de bord' navigates to /dashboard"
          - "Clean layout without broken components"

      # --- Mobile (375px) — AssignmentCard Navigation ---
      - id: 06-assignment-card-link-mobile
        url: /dashboard
        viewport: [375, 812]
        desc: "Dashboard with AssignmentCards wrapped in <Link> for navigation to activity detail"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/activities/my-assignments": "assignments_data"
        ux_checks:
          - "Assignment cards are rendered as clickable links"
          - "Cards have proper <a> tag wrapping (Link component)"
          - "href attributes point to /activities/{activityId}"
          - "Cards maintain existing visual styling (rounded-2xl, department color border)"
          - "Cursor-pointer on hover"

