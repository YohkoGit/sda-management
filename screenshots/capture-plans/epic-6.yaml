  - "§8 User Journey Flows — Journey 2: Check and Confirm"
  - "§9 Component Strategy — ActivityCard list variant, Avatar 28px"
  - "§10 UX Consistency Patterns — Authenticated Register rules"
  - "§11 Responsive Design & Accessibility"

