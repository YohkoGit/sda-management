# Capture Plan — Epic 5: Public Dashboard & Anonymous Experience
# Used ONLY during screenshot capture sessions (not loaded during dev-story)

epic: 5
name: "Public Dashboard & Anonymous Experience"

prerequisites:
  app_running: true
  base_url: "http://localhost:5173"
  auth_roles_needed: [anonymous]
  seed_data: "At least 1 public-visibility activity with prédicateur assigned, church identity configured"

ux_spec_sections:
  - "§6 Visual Design Foundation — Color System, Typography System"
  - "§7 Design Direction — Mock Faithful Command (A+D Hybrid)"
  - "§8 User Journey Flows — Journey 1: Open and Know"
  - "§9 Component Strategy — ActivityCard hero variant, StaffingIndicator"
  - "§10 UX Consistency Patterns — Public Register rules"
  - "§11 Responsive Design & Accessibility"

stories:
  5-1-public-dashboard-hero-section-and-next-activity:
    description: "Public dashboard hero with church identity and next activity"
    role: anonymous
    screens:
      # --- Mobile (375px) ---
      - id: 01-hero-mobile-loaded
        url: /
        viewport: [375, 812]
        desc: "Hero section mobile — church identity + next activity with prédicateur"
        actions: []
        ux_checks:
          - "bg-slate-800 dark hero background (NOT slate-900)"
          - "Church name in text-3xl font-black text-white"
          - "Address + welcome message in text-sm text-slate-300"
          - "Prédicateur 48px avatar (circular, rounded-full)"
          - "Prédicateur name in text-xl font-bold text-white"
          - "Department badge with abbreviation"
          - "Date in warm French format ('Ce Sabbat' or lowercase date)"
          - "Start/end times visible"
          - "Full-width, vertically stacked layout"
          - "Prédicateur visible above fold without scrolling"
          - "Minimum 14px text (public register — no micro-labels)"
          - "Inter font throughout"

      - id: 02-hero-mobile-topnav
        url: /
        viewport: [375, 812]
        desc: "Public top nav on mobile with hero below"
        actions: []
        ux_checks:
          - "Sticky top nav visible"
          - "Church name in nav"
          - "Hamburger menu icon (not full nav links)"
          - "Connexion button visible"
          - "French labels by default"

      # --- Desktop (1280px) ---
      - id: 03-hero-desktop-loaded
        url: /
        viewport: [1280, 800]
        desc: "Hero section desktop — side-by-side church identity + activity"
        actions: []
        ux_checks:
          - "bg-slate-800 dark hero background"
          - "lg:flex layout — church identity left, activity right"
          - "Inner content constrained: max-w-7xl"
          - "48px prédicateur avatar + name"
          - "Department badge with abbreviation"
          - "Full top nav with all links visible (not hamburger)"
          - "Connexion button right-aligned in nav"
          - "py-16 vertical padding on desktop (sm:py-16)"

      # --- Empty state ---
      - id: 04-hero-empty-state
        url: /
        viewport: [375, 812]
        desc: "Hero section when no upcoming activities (204 response)"
        actions:
          - mock_override: "publicHandlersEmpty"
        ux_checks:
          - "Church identity still visible (name, address, welcome)"
          - "Empty message: 'Aucune activité à venir — revenez bientôt!'"
          - "Message in text-base text-slate-300"
          - "No broken layout or missing sections"

      # --- Loading state ---
      - id: 05-hero-loading-skeleton
        url: /
        viewport: [375, 812]
        desc: "Hero section skeleton loading state"
        actions:
          - mock_override: "publicHandlersDelayed"
          - note: "Capture before data resolves — skeleton should show"
        ux_checks:
          - "Church identity loads first (from cached config)"
          - "Skeleton placeholders for activity data"
          - "Skeleton uses bg-slate-700 (NOT default bg-accent)"
          - "Skeleton shapes match final layout (circle for avatar, bars for text)"

      # --- Error state ---
      - id: 06-hero-error-state
        url: /
        viewport: [375, 812]
        desc: "Hero section when API returns error"
        actions:
          - mock_override: "publicHandlersError"
        ux_checks:
          - "Church identity still visible"
          - "Error message: 'Impossible de charger les activités'"
          - "Subtle error text in text-sm text-slate-400"
          - "No full error page or crash"

      # --- Other public pages (layout impact from 5.1) ---
      - id: 07-public-calendar-page
        url: /calendar
        viewport: [1280, 800]
        desc: "Public calendar page with own max-w wrapper (post 5.1 layout change)"
        actions: []
        ux_checks:
          - "Content has mx-auto max-w-7xl wrapper"
          - "Not full-bleed (unlike hero)"
          - "Top nav consistent with homepage"

      - id: 08-public-departments-page
        url: /departments
        viewport: [1280, 800]
        desc: "Public departments page with own max-w wrapper"
        actions: []
        ux_checks:
          - "Content has mx-auto max-w-7xl wrapper"
          - "Top nav consistent"

      # --- Language toggle ---
      - id: 09-hero-english-toggle
        url: /
        viewport: [1280, 800]
        desc: "Hero section after switching to English"
        actions:
          - click: "language-toggle"
        ux_checks:
          - "All hero text in English"
          - "'This Sabbath' or English date format"
          - "'Preacher' label instead of 'Prédicateur'"
          - "Nav labels in English"

  5-2-youtube-live-stream-embed:
    description: "YouTube section with live indicator, embed modes, and link card fallback"
    role: anonymous
    note: "Backend down — all API responses mocked via Playwright route interception"
    screens:
      # --- Link Card Mode (channel URL, not live) ---
      - id: 01-youtube-link-card-mobile
        url: /
        viewport: [375, 812]
        desc: "HomePage YouTube section — link card mode (channel URL, not live)"
        actions:
          - route_mock: { "/api/config": "configWithYouTubeChannel", "/api/public/next-activity": "nextActivity", "/api/public/live-status": "notLive" }
        ux_checks:
          - "YouTube section visible below hero"
          - "Heading 'Suivez le culte en direct' in text-2xl font-bold text-slate-900"
          - "NO live indicator (EN DIRECT) shown"
          - "Link card with YouTube play icon (red circle, white triangle)"
          - "'Regarder sur YouTube' text in text-base font-semibold"
          - "Card has rounded-2xl border border-slate-200 bg-slate-50"
          - "aspect-video maintained (16:9 ratio)"
          - "Section bg-white (contrast with dark hero above)"
          - "Minimum 14px text (public register)"
          - "Full-width on mobile"

      - id: 02-youtube-link-card-desktop
        url: /
        viewport: [1280, 800]
        desc: "HomePage YouTube section — link card desktop"
        actions:
          - route_mock: { "/api/config": "configWithYouTubeChannel", "/api/public/next-activity": "nextActivity", "/api/public/live-status": "notLive" }
        ux_checks:
          - "YouTube section below hero, constrained by max-w-7xl"
          - "Heading + content within px-4 sm:py-12 padding"
          - "Link card centered in container"
          - "rounded-2xl card with shadow on hover (verify hover state if possible)"
          - "Content not full-bleed, proper max-width constraint"

      # --- Live Embed Mode (API returns isLive=true) ---
      - id: 03-youtube-live-embed-mobile
        url: /
        viewport: [375, 812]
        desc: "HomePage YouTube section — live embed with EN DIRECT indicator"
        actions:
          - route_mock: { "/api/config": "configWithYouTubeChannel", "/api/public/next-activity": "nextActivity", "/api/public/live-status": "live" }
        ux_checks:
          - "YouTube section visible below hero"
          - "Heading 'Suivez le culte en direct'"
          - "LiveIndicator visible: pulsing rose-500 dot (8px, animate-pulse) + 'EN DIRECT' text"
          - "EN DIRECT text in text-sm font-semibold text-rose-500"
          - "Heading + LiveIndicator inline-flex on same line (gap-3)"
          - "iframe embed visible with 16:9 aspect ratio (aspect-video)"
          - "iframe has rounded-2xl overflow-hidden shadow-lg"
          - "Full-width embed on mobile"

      - id: 04-youtube-live-embed-desktop
        url: /
        viewport: [1280, 800]
        desc: "HomePage YouTube section — live embed desktop"
        actions:
          - route_mock: { "/api/config": "configWithYouTubeChannel", "/api/public/next-activity": "nextActivity", "/api/public/live-status": "live" }
        ux_checks:
          - "iframe embed at 16:9 ratio within max-w-7xl"
          - "LiveIndicator inline with heading"
          - "rounded-2xl shadow-lg on embed container"
          - "sm:py-12 vertical padding"

      # --- Static Embed Mode (video URL, not live) ---
      - id: 05-youtube-static-embed-mobile
        url: /
        viewport: [375, 812]
        desc: "HomePage YouTube section — static embed (video URL in config, not live)"
        actions:
          - route_mock: { "/api/config": "configWithVideoUrl", "/api/public/next-activity": "nextActivity", "/api/public/live-status": "notLive" }
        ux_checks:
          - "iframe embed visible (static video from URL)"
          - "NO live indicator shown (not live)"
          - "aspect-video 16:9 ratio maintained"
          - "rounded-2xl shadow-lg on embed"

      # --- No YouTube URL (section hidden) ---
      - id: 06-youtube-no-url-mobile
        url: /
        viewport: [375, 812]
        desc: "HomePage — YouTube section completely hidden when no URL configured"
        actions:
          - route_mock: { "/api/config": "configNoYouTube", "/api/public/next-activity": "nextActivity", "/api/public/live-status": "notLive" }
        ux_checks:
          - "NO YouTube section visible"
          - "Hero section renders normally"
          - "No empty container, no broken embed, no gap"
          - "Page flows directly from hero to next section placeholder"

      # --- LivePage ---
      - id: 07-live-page-link-card-desktop
        url: /live
        viewport: [1280, 800]
        desc: "LivePage with YouTubeSection — link card mode"
        actions:
          - route_mock: { "/api/config": "configWithYouTubeChannel", "/api/public/live-status": "notLive" }
        ux_checks:
          - "Page title 'En Direct' in text-2xl font-black"
          - "YouTubeSection rendered below title"
          - "Link card mode (channel URL, not live)"
          - "Page wrapper mx-auto max-w-7xl px-4 py-6"
          - "Content constrained, not full-bleed"

      - id: 08-live-page-live-mobile
        url: /live
        viewport: [375, 812]
        desc: "LivePage with live embed + EN DIRECT indicator"
        actions:
          - route_mock: { "/api/config": "configWithYouTubeChannel", "/api/public/live-status": "live" }
        ux_checks:
          - "Page title 'En Direct'"
          - "YouTubeSection with live embed iframe"
          - "LiveIndicator pulsing rose-500 dot + 'EN DIRECT'"
          - "Full-width embed on mobile"

