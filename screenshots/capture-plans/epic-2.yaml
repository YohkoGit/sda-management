  2-6-guided-first-time-setup-experience:
    description: "Setup checklist on dashboard for OWNER — progressive step completion"
    role: owner
    screens:
      # --- Mobile (375px) ---
      - id: 01-setup-checklist-step1-mobile
        url: /dashboard
        viewport: [375, 812]
        desc: "Setup checklist showing step 1 as current (Paramètres)"
        actions:
