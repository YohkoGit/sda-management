# Capture Plan — Epic 2: Church Configuration & First-Time Setup
# Used ONLY during screenshot capture sessions (not loaded during dev-story)

epic: 2
name: "Church Configuration & First-Time Setup"

prerequisites:
  app_running: true
  base_url: "http://localhost:5173"
  auth_roles_needed: [owner]
  seed_data: "Owner seeded via OWNER_EMAIL, church identity configured, departments created, templates created, schedules created"

ux_spec_sections:
  - "§6 Visual Design Foundation — Color System, Typography System, Spacing & Layout"
  - "§7 Design Direction — Mock Faithful Command (A+D Hybrid)"
  - "§9 Component Strategy — Card grids, Form patterns, Empty states"
  - "§10 UX Consistency Patterns — Button Hierarchy, Form Patterns, Feedback Patterns, Modal & Overlay"
  - "§11 Responsive Design & Accessibility — Touch Targets, Focus Management"

stories:
  2-1-church-identity-settings:
    description: "Church identity settings form — OWNER-only admin page"
    role: owner
    screens:
      # --- Mobile (375px) ---
      - id: 01-settings-form-mobile
        url: /admin/settings
        viewport: [375, 812]
        desc: "Church identity settings form on mobile"
        actions:
          - login: "as owner user"
        ux_checks:
          - "Page title text-2xl font-black"
          - "Single-column form layout"
          - "Labels above fields (not floating)"
          - "Full-width inputs on mobile"
          - "44px minimum touch targets on inputs"
          - "Inter font throughout"
          - "Primary save button full-width at bottom"
          - "indigo-600 on primary button"

      - id: 02-settings-form-populated-mobile
        url: /admin/settings
        viewport: [375, 812]
        desc: "Settings form populated with existing church config"
        actions:
          - login: "as owner user"
        ux_checks:
          - "Fields populated with existing data"
          - "Church name, address, YouTube URL, phone, welcome message visible"
          - "Default locale dropdown visible"
          - "Optional fields marked (optionnel)"

      - id: 03-settings-success-toast-mobile
        url: /admin/settings
        viewport: [375, 812]
        desc: "Success toast after saving settings"
        actions:
          - login: "as owner user"
          - click: "save button"
        ux_checks:
          - "Green success toast visible"
          - "Toast text: 'Sauvegarde réussie' or similar"
          - "Toast at bottom-center on mobile"
          - "3s auto-dismiss"

      # --- Desktop (1280px) ---
      - id: 04-settings-form-desktop
        url: /admin/settings
        viewport: [1280, 800]
        desc: "Church identity settings form on desktop"
        actions:
          - login: "as owner user"
        ux_checks:
          - "Persistent left sidebar (288px)"
          - "Form in max-width container (not full-width)"
          - "Labels above fields"
          - "Card container with rounded-2xl"
          - "Submit button right-aligned"
          - "indigo-600 accent on primary action"
          - "Sidebar shows active 'Paramètres' with indigo-600"

      - id: 05-settings-loading-skeleton-desktop
        url: /admin/settings
        viewport: [1280, 800]
        desc: "Loading skeleton while fetching church config"
        actions:
          - login: "as owner user"
          - mock_override: "settingsDelayed"
        ux_checks:
          - "Skeleton placeholders for form fields"
          - "Skeleton pulse animation"
          - "Layout matches final form structure"

  2-2-department-crud-and-sub-ministries:
    description: "Department CRUD with card grid, create/edit dialog, sub-ministries"
    role: owner
    screens:
      # --- Mobile (375px) ---
      - id: 01-departments-empty-mobile
        url: /admin/departments
        viewport: [375, 812]
        desc: "Empty state when no departments exist"
        actions:
          - login: "as owner user"
          - mock_override: "departmentsEmpty"
        ux_checks:
          - "Centered icon (FolderTree)"
          - "Heading font-semibold"
          - "Helper text muted-foreground, max-w-sm"
          - "Create button below guidance text"
          - "French guidance text"

      - id: 02-departments-grid-mobile
        url: /admin/departments
        viewport: [375, 812]
        desc: "Department cards in single-column layout on mobile"
        actions:
          - login: "as owner user"
        ux_checks:
          - "Single-column card layout on mobile"
          - "Each card: left border colored by department.color"
          - "Department name + abbreviation badge"
          - "Description text snippet"
          - "Edit/Delete action buttons (Pencil, Trash)"
          - "44px touch targets on action buttons"
          - "rounded-2xl cards"

      - id: 03-department-create-dialog-mobile
        url: /admin/departments
        viewport: [375, 812]
        desc: "Create department dialog/sheet on mobile"
        actions:
          - login: "as owner user"
          - click: "create department button"
        ux_checks:
          - "Sheet slides up from bottom on mobile"
          - "Name, abbreviation, color picker, description fields"
          - "Sub-ministry management section (add/remove rows)"
          - "Labels above fields"
          - "Full-width inputs"
          - "Primary 'Créer' button full-width"
          - "Cancel button as secondary/ghost"

      - id: 04-department-color-picker-mobile
        url: /admin/departments
        viewport: [375, 812]
        desc: "Color picker component open in create dialog"
        actions:
          - login: "as owner user"
          - click: "create department button"
          - click: "color picker"
        ux_checks:
          - "react-colorful picker visible"
          - "44px touch targets"
          - "Current color preview"

      - id: 05-department-delete-confirm-mobile
        url: /admin/departments
        viewport: [375, 812]
        desc: "Delete confirmation AlertDialog"
        actions:
          - login: "as owner user"
          - click: "delete button on a department card"
        ux_checks:
          - "AlertDialog with warning text"
          - "Destructive 'Supprimer' button in red-600"
          - "'Annuler' cancel button as secondary"
          - "French confirmation text"

      # --- Desktop (1280px) ---
      - id: 06-departments-grid-desktop
        url: /admin/departments
        viewport: [1280, 800]
        desc: "Department cards in 3-column grid on desktop"
        actions:
          - login: "as owner user"
        ux_checks:
          - "3-column card grid (lg:grid-cols-3)"
          - "Persistent left sidebar"
          - "Page title text-2xl font-black"
          - "Create button top-right (Plus icon)"
          - "Cards with elevation-1 shadow-sm"
          - "Cards lift on hover (elevation-2, translateY(-2px))"
          - "Left border colored by department.color on each card"

      - id: 07-department-edit-dialog-desktop
        url: /admin/departments
        viewport: [1280, 800]
        desc: "Edit department dialog on desktop"
        actions:
          - login: "as owner user"
          - click: "edit button on a department card"
        ux_checks:
          - "Dialog (not sheet) on desktop"
          - "Form pre-populated with department data"
          - "Color picker visible"
          - "Sub-ministry rows with add/remove"
          - "'Modifier' button as primary"
          - "Dialog with rounded-2xl container"

