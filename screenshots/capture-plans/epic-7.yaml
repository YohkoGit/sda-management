stories:
  7-1-calendar-core-sunday-first-with-multiple-views:
    description: "Calendar core with Sunday-first layout, ViewSwitcher (Day/Week/Month/Year), YearGrid, drill-to-day"
    role: anonymous
    note: "Backend down — all API responses mocked via Playwright route interception"
    screens:
      # --- PUBLIC CALENDAR: Month Grid ---
      - id: 01-month-grid-desktop
        url: /calendar
        viewport: [1280, 800]
        desc: "Default month grid view on desktop with ViewSwitcher and department-colored events"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
        ux_checks:
          - "Schedule-X month grid visible with day cells"
          - "Sunday-first week layout (first column is Sunday)"
          - "Department-colored event blocks visible (CU rose, JA teal, MIFEM violet)"
          - "Event blocks show department abbreviation in title ([CU], [JA], [MIFEM])"
          - "Color blocks large enough for quick-scan category signal (UX §579)"
          - "Color + text rule: department abbreviation always accompanies color (UX §577)"
          - "ViewSwitcher visible with 4 buttons: Day / Week / Month / Year (full labels on desktop)"
          - "Month button highlighted as active view (aria-selected=true)"
          - "ViewSwitcher uses role=tablist with role=tab on each button"
          - "Calendar container has explicit height (h-[800px] on lg)"
          - "mx-auto max-w-7xl px-4 sm:py-8 wrapper"
          - "role=region with aria-label on calendar container"
          - "No unintentional horizontal scroll (UX §1726)"

      - id: 02-month-grid-mobile
        url: /calendar
        viewport: [375, 812]
        desc: "Month grid on mobile with abbreviated ViewSwitcher labels"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
        ux_checks:
          - "Month grid visible — compact on mobile"
          - "Sunday-first layout"
          - "Department-colored events visible"
          - "ViewSwitcher shows abbreviated labels: D / W / M / Y (mobile)"
          - "M button highlighted as active"
          - "h-[600px] calendar container height on mobile"
          - "No horizontal scroll"
          - "px-4 py-6 padding"

      # --- PUBLIC CALENDAR: Week View ---
      - id: 03-week-view-desktop
        url: /calendar
        viewport: [1280, 800]
        desc: "Week view on desktop — Sunday-first 7-day grid with time axis"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_view: "week"
        ux_checks:
          - "7-day week view with time axis (06:00–22:00)"
          - "Sunday-first layout (first column is Sunday, last is Saturday)"
          - "Department-colored event blocks in time slots"
          - "Events positioned correctly by time"
          - "Event width ~95% of column (weekOptions.eventWidth: 95)"
          - "ViewSwitcher shows Week as active"
          - "Day headers show day name + date number"
          - "No horizontal scroll on desktop"

      - id: 04-week-view-mobile
        url: /calendar
        viewport: [375, 812]
        desc: "Week view on mobile — responsive day view (isResponsive: true)"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_view: "week"
        ux_checks:
          - "Schedule-X responsive mode — day view on mobile viewport"
          - "Department-colored events visible on timeline"
          - "No horizontal scroll"
          - "Calendar fills container width"
          - "h-[600px] container height"

      # --- PUBLIC CALENDAR: Day View ---
      - id: 05-day-view-desktop
        url: /calendar
        viewport: [1280, 800]
        desc: "Day view on desktop — single day timeline with events"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_view: "day"
        ux_checks:
          - "Single day view with time axis"
          - "Department-colored event blocks positioned by time"
          - "ViewSwitcher shows Day as active"
          - "Event blocks show department abbreviation + title"
          - "Day header shows full date"

      - id: 06-day-view-mobile
        url: /calendar
        viewport: [375, 812]
        desc: "Day view on mobile"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_view: "day"
        ux_checks:
          - "Day view fills mobile width"
          - "Events visible with department colors"
          - "No horizontal scroll"
          - "ViewSwitcher shows D as active (abbreviated)"

      # --- PUBLIC CALENDAR: Year View ---
      - id: 07-year-view-desktop
        url: /calendar
        viewport: [1280, 800]
        desc: "Year view on desktop — custom YearGrid with 12 mini-months in 4x3 grid"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_view: "year"
        ux_checks:
          - "12 mini-month calendars visible in 4x3 grid layout (lg:grid-cols-4)"
          - "Year prominently displayed in header (2026)"
          - "Prev/next year navigation arrows in header"
          - "Each mini-month shows Sunday-first 7-column grid"
          - "Day numbers visible in each mini-month"
          - "Today's date marked/highlighted"
          - "Department-colored activity dots on days with activities"
          - "Month headers visible (January–December or localized)"
          - "ViewSwitcher shows Year as active"
          - "role=grid with aria-label on YearGrid"
          - "No explicit fixed height — auto height with content"

      - id: 08-year-view-mobile
        url: /calendar
        viewport: [375, 812]
        desc: "Year view on mobile — 2-column responsive grid"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_view: "year"
        ux_checks:
          - "2-column mini-month grid on mobile (< 640px)"
          - "Year header with navigation arrows"
          - "Mini-months with Sunday-first layout"
          - "Department-colored dots visible"
          - "Scrollable content (not fixed height)"
          - "ViewSwitcher shows Y as active (abbreviated)"
          - "No horizontal scroll"

      # --- PUBLIC CALENDAR: Drill-to-Day ---
      - id: 09-drill-to-day-desktop
        url: /calendar
        viewport: [1280, 800]
        desc: "Month grid → click a day → drills into Day view"
        actions:
          - route_mock:
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_day_in_month: "2026-03-14"
        ux_checks:
          - "After clicking a day in month grid, switches to Day view"
          - "Day view shows the clicked date (March 14)"
          - "ViewSwitcher now shows Day as active"
          - "Events for that day visible with department colors"
          - "onClickDate callback successfully triggered view switch"

      # --- AUTH CALENDAR ---
      - id: 10-auth-month-desktop
        url: /my-calendar
        viewport: [1280, 800]
        desc: "Authenticated calendar page — month grid with sidebar visible"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
        ux_checks:
          - "Calendar renders same as public calendar"
          - "Authenticated sidebar visible on left"
          - "ViewSwitcher with 4 options visible"
          - "Month grid with department-colored events"
          - "Sunday-first layout"
          - "No 'REGISTRE PERSONNEL' micro-label yet (deferred to 7.2)"

      - id: 11-auth-month-mobile
        url: /my-calendar
        viewport: [375, 812]
        desc: "Authenticated calendar page on mobile"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/public/calendar": "calendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
        ux_checks:
          - "Calendar renders on mobile"
          - "Bottom nav visible (authenticated mobile layout)"
          - "ViewSwitcher abbreviated labels (D/W/M/Y)"
          - "Month grid with events"
          - "No horizontal scroll"

  7-2-calendar-visibility-and-department-filtering:
    description: "Auth calendar with department filter, auth-scoped endpoint, regression: public calendar has no filter"
    role: viewer
    note: "Backend down — all API responses mocked via Playwright route interception"
    screens:
      # --- AUTH CALENDAR: Filter Default (All) ---
      - id: 12-auth-filter-default-desktop
        url: /my-calendar
        viewport: [1280, 800]
        desc: "Auth calendar with DepartmentFilter visible, 'All' chip active (default state)"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/calendar": "authCalendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
        ux_checks:
          - "DepartmentFilter visible between heading and calendar"
          - "'All' chip active (bg-indigo-600 text-white)"
          - "3 department chips: CU, JA, MIFEM — each with color dot + abbreviation"
          - "Inactive chips have bg-slate-100 text-slate-700 style"
          - "Color dots: CU rose (#F43F5E), JA teal (#14B8A6), MIFEM violet (#8B5CF6)"
          - "DepartmentFilter uses role='toolbar' with aria-label"
          - "Each chip has role='checkbox' with aria-checked"
          - "gap-2 between chips, mb-4 below filter"
          - "Calendar shows 5 activities (3 CU + 1 JA + 1 MIFEM) — more than public calendar's 4"
          - "Auth calendar uses /api/calendar endpoint (not /api/public/calendar)"
          - "Calendar heading: text-2xl font-bold text-slate-900"
          - "ViewSwitcher visible alongside heading"

      - id: 13-auth-filter-default-mobile
        url: /my-calendar
        viewport: [375, 812]
        desc: "Auth calendar with DepartmentFilter on mobile — horizontal scroll if needed"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/calendar": "authCalendarActivities"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
        ux_checks:
          - "DepartmentFilter chips visible on mobile"
          - "'All' chip active (indigo-600)"
          - "Chips row has overflow-x-auto for horizontal scroll if chips overflow"
          - "Each chip shows color dot + abbreviation"
          - "Bottom nav visible (authenticated mobile layout)"
          - "Calendar month grid below filter"
          - "No unintentional page-level horizontal scroll"
          - "shrink-0 on chips prevents wrapping/compression"

      # --- AUTH CALENDAR: Filter Active (JA selected) ---
      - id: 14-auth-filter-active-desktop
        url: /my-calendar
        viewport: [1280, 800]
        desc: "Auth calendar with JA department selected — filtered view showing only JA activities"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/calendar": "authCalendarFiltered_JA"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_chip: "JA"
        ux_checks:
          - "'All' chip is now inactive (bg-slate-100)"
          - "JA chip is active — filled with JA color (#14B8A6) and white text"
          - "CU and MIFEM chips are inactive (bg-slate-100)"
          - "Active chip shows white/40 dot (not color dot)"
          - "Calendar shows only JA activities (Programme JA)"
          - "Month grid with reduced activity count reflects filter"
          - "Filter persists — chip state matches data displayed"

      - id: 15-auth-filter-active-mobile
        url: /my-calendar
        viewport: [375, 812]
        desc: "Auth calendar filtered to JA on mobile"
        actions:
          - route_mock:
              "/api/auth/me": "auth_me_viewer"
              "/api/config": "publicConfig"
              "/api/public/departments": "departments"
              "/api/calendar": "authCalendarFiltered_JA"
              "/api/public/next-activity": "nextActivity"
              "/api/public/live-status": "notLive"
          - click_chip: "JA"
        ux_checks:
