# Capture Plan — Epic 7: Calendar
# Used ONLY during screenshot capture sessions (not loaded during dev-story)

epic: 7
name: "Calendar"

prerequisites:
  app_running: true
  base_url: "http://localhost:5173"
  auth_roles_needed: [anonymous, viewer]
  seed_data: "N/A — all API responses mocked via Playwright route interception"
  note: "Backend down — all API responses mocked via Playwright route interception"

ux_spec_sections:
  - "§6 Visual Design Foundation — Department Color Palette (muted tints, color+text rule)"
  - "§8 User Journey Flows — Journey 1: Open and Know (calendar tab)"
  - "§9 Component Strategy — WeekCalendar (Schedule-X), ADR-1"
  - "§10 UX Consistency Patterns — Public Register rules"
  - "§11 Responsive Design & Accessibility — Calendar breakpoint table, horizontal scroll rule"
  - "§11 Touch & Gesture Patterns — swipe horizontal for calendar"

