name: Build & Push deployment image

# Branch-per-environment model:
#   - push to `qa`      → publish ghcr.io/yohkogit/sda-management:qa + :qa-<sha>
#   - push to `release` → publish ghcr.io/yohkogit/sda-management:prod + :prod-<sha>
#
# `main` is the integration branch; pushes to it run CI tests only (ci.yml).
# Promote by merging main → qa, then qa → release once verified.
#
# Moving tags (:qa / :prod) are what the deployment hosts pull on a refresh
# cron. Immutable SHA tags exist for rollback ("docker pull ...:qa-<old-sha>").

on:
  push:
    branches: [qa, release]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine tag prefix from branch
        id: target
        # qa branch → :qa + :qa-<sha>
        # release branch → :prod + :prod-<sha>
        # Anything else (only reachable via workflow_dispatch from main) fails fast.
        run: |
          case "${{ github.ref_name }}" in
            qa)
              echo "tag_prefix=qa" >> "$GITHUB_OUTPUT"
              ;;
            release)
              echo "tag_prefix=prod" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "::error::Unsupported branch '${{ github.ref_name }}'. This workflow only builds qa and release." >&2
              exit 1
              ;;
          esac

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/yohkogit/sda-management:${{ steps.target.outputs.tag_prefix }}
            ghcr.io/yohkogit/sda-management:${{ steps.target.outputs.tag_prefix }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
