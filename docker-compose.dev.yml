services:
  postgres:
    image: postgres:17
    container_name: sdamanagement-postgres
    environment:
      POSTGRES_DB: sdamanagement
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  pgdata:
